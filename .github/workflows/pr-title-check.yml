name: Pull Request Title Check

on:
  pull_request:
    branches:
      - '**'
    types: [opened, synchronize, reopened, edited]

jobs:
  commitlint:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate PR title
        run: |
          # Check PR title format - will fail the job if format is invalid
          echo "Checking PR title: ${{ github.event.pull_request.title }}"

          # Define regex pattern: [AURON #<number>] <description>
          # Pattern breakdown:
          # ^\[AURON #        - starts with [AURON #
          # [0-9]+            - one or more digits (issue number)
          # \]                - closing bracket
          # [ ]+              - one or more spaces
          # .{3,100}          - description: 3-100 characters
          # $                 - end of string
          PATTERN='^\[AURON #[0-9]+\] .{3,100}$'

          # Use commitlint to validate PR title format
          if ! echo "${{ github.event.pull_request.title }}" | grep -qE "$PATTERN"; then 
            echo ""
            echo "❌ PR title format validation failed!"
            echo ""
            echo "📝 Expected format: [AURON #<issueNumber>] <description>"
            echo ""
            echo "🌰 e.g. '[AURON #XXXX] Short summary...'"
            exit 1
          else
            echo "✅ PR title format is valid."
          fi