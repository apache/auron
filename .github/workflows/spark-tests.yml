name: Spark Correctness Tests

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - branch-*
  pull_request:
    branches:
      - master
      - branch-*

concurrency:
  group: spark-tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  spark-correctness-tests:
    name: Spark ${{ matrix.sparkver }} (JDK ${{ matrix.javaver }}, Scala ${{ matrix.scalaver }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - sparkver: "3.1"
            scalaver: "2.12"
            javaver: "8"
          - sparkver: "3.2"
            scalaver: "2.12"
            javaver: "8"
          - sparkver: "3.3"
            scalaver: "2.12"
            javaver: "8"
          - sparkver: "3.4"
            scalaver: "2.12"
            javaver: "11"
          - sparkver: "3.5"
            scalaver: "2.13"
            javaver: "17"
          - sparkver: "3.5"
            scalaver: "2.13"
            javaver: "21"
          - sparkver: "4.0"
            scalaver: "2.13"
            javaver: "21"
          - sparkver: "4.1"
            scalaver: "2.13"
            javaver: "21"

    steps:
      - name: Checkout Auron
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Java and Maven cache
        uses: actions/setup-java@v5
        with:
          distribution: 'adopt-hotspot'
          java-version: ${{ matrix.javaver }}
          cache: 'maven'

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "21.7"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain
        with:
          rustflags: --allow warnings -C target-feature=+aes
          components:
            cargo

      - name: Compute short spark version
        id: short
        run: |
          SHORT="${{ matrix.sparkver }}"
          echo "sparkver=${SHORT//./}" >> "$GITHUB_OUTPUT"

      - name: Install Auron + spark-tests modules (skip tests)
        run: |
          rm -f .build-checksum_*.cache
          ./auron-build.sh \
            --pre \
            --sparkver ${{ matrix.sparkver }} \
            --scalaver ${{ matrix.scalaver }} \
            --skiptests true \
            --sparktests true

      - name: Run Auron spark correctness tests
        run: >
          ./build/mvn -B test
          -pl auron-spark-tests/common,auron-spark-tests/spark${{ steps.short.outputs.sparkver }}
          -Pspark-tests
          -Pspark-${{ matrix.sparkver }}
          -Pscala-${{ matrix.scalaver }}

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spark-tests-reports-${{ matrix.sparkver }}_${{ matrix.scalaver }}-jdk-${{ matrix.javaver }}
          path: "auron-spark-tests/**/target/surefire-reports/*.xml"

      - name: Upload unit tests log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: spark-tests-logs-${{ matrix.sparkver }}_${{ matrix.scalaver }}-jdk-${{ matrix.javaver }}
          path: "auron-spark-tests/**/target/unit-tests.log"
